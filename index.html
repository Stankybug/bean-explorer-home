<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bean Explorer</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        /* Apply the combined strobe animation */
        animation: strobeBackground 5s infinite;
    }

    /* Cool combined red-blue strobe background */
    @keyframes strobeBackground {
        0%   { background-color: #660000; }
        10%  { background-color: #990033; }
        20%  { background-color: #660066; }
        30%  { background-color: #330099; }
        40%  { background-color: #000066; }
        50%  { background-color: #330066; }
        60%  { background-color: #660033; }
        70%  { background-color: #990033; }
        80%  { background-color: #660066; }
        90%  { background-color: #330099; }
        100% { background-color: #660000; }
    }

    .container {
        text-align: center;
        z-index: 1;
        position: relative;
    }

    h1 {
        font-size: 70px;
        color: white;
        letter-spacing: 4px;
        animation: glow 3s ease-in-out infinite alternate, float 4s ease-in-out infinite;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 10px #00ffcc,
                         0 0 20px #00ffcc,
                         0 0 30px #00ffcc;
        }
        to {
            text-shadow: 0 0 20px #00ffff,
                         0 0 40px #00ffff,
                         0 0 60px #00ffff;
        }
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    .search-box {
        margin-top: 40px;
    }

    input[type="text"] {
        width: 400px;
        padding: 15px 20px;
        border-radius: 50px;
        border: none;
        outline: none;
        font-size: 18px;
        transition: 0.3s;
        box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    input[type="text"]:focus {
        width: 450px;
        box-shadow: 0 0 20px #00ffff;
    }

    button {
        margin-left: 10px;
        padding: 15px 25px;
        border-radius: 50px;
        border: none;
        background: #00ffff;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00ffcc;
        transform: scale(1.05);
    }

    footer {
        position: absolute;
        bottom: 20px;
        color: white;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Bean Explorer</h1>
    
    <div class="search-box">
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Search" required>
            <button type="submit">Search</button>
        </form>
    </div>
</div>

</body>
</html>
